<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<title>AI Security Radar</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>

body{
background:black;
color:#00ff88;
font-family:monospace;
text-align:center;
}

video{
border:2px solid #00ff88;
}

canvas{
position:absolute;
left:0;
top:0;
}

.alert{
color:red;
font-size:22px;
}

.safe{
color:#00ff88;
}

button{
padding:10px;
margin:5px;
background:#002b1b;
color:#00ff88;
border:1px solid #00ff88;
}

</style>

</head>

<body>

<h2>AI Camera Security System</h2>

<div style="position:relative;display:inline-block">

<video id="video" width="640" height="480" autoplay></video>
<canvas id="canvas" width="640" height="480"></canvas>

</div>

<br>

<button onclick="toggleNight()">Night Mode</button>

<h3 id="status">System ready</h3>

<script>

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let model
let night=false

async function startCamera(){

let stream=await navigator.mediaDevices.getUserMedia({video:true})

video.srcObject=stream

}

function alarm(){

let audio=new AudioContext()

let osc=audio.createOscillator()

osc.frequency.value=300

osc.connect(audio.destination)

osc.start()

setTimeout(()=>osc.stop(),600)

}

function toggleNight(){

night=!night

if(night){

video.style.filter="brightness(1.8) contrast(1.5)"

}else{

video.style.filter="none"

}

}

async function loadModel(){

model=await cocoSsd.load()

detect()

}

async function detect(){

const predictions=await model.detect(video)

ctx.clearRect(0,0,640,480)

let danger=false

predictions.forEach(p=>{

let x=p.bbox[0]
let y=p.bbox[1]
let w=p.bbox[2]
let h=p.bbox[3]

let label=p.class

if(label==="knife"){

ctx.strokeStyle="red"
danger=true

}else{

ctx.strokeStyle="#00ff88"

}

ctx.lineWidth=3

ctx.strokeRect(x,y,w,h)

ctx.fillStyle=ctx.strokeStyle

ctx.fillText(label,x,y)

})

if(danger){

document.getElementById("status").innerHTML="🚨 ALERT DANGEROUS OBJECT"
document.getElementById("status").className="alert"

alarm()

}else{

document.getElementById("status").innerHTML="Area secure"
document.getElementById("status").className="safe"

}

requestAnimationFrame(detect)

}

startCamera()

loadModel()

</script>

</body>
</html>
