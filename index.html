<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>AI Radar Vision v4</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>

body{
background:black;
color:#00ff88;
font-family:monospace;
text-align:center;
}

#container{
position:relative;
display:inline-block;
}

video{
border:2px solid #00ff88;
}

canvas{
position:absolute;
left:0;
top:0;
}

#menu{
margin-top:20px;
padding:20px;
border:1px solid #00ff88;
width:700px;
margin:auto;
}

button{
padding:10px;
margin:5px;
background:#002b1b;
color:#00ff88;
border:1px solid #00ff88;
}

.alert{
color:red;
font-size:22px;
}

</style>

</head>

<body>

<h2>AI Radar Vision System</h2>

<div id="container">

<video id="video" width="640" height="480" autoplay></video>
<canvas id="canvas" width="640" height="480"></canvas>

</div>

<div id="menu">

<button onclick="toggleNight()">Night Vision</button>
<button onclick="toggleThermal()">Thermal Mode</button>
<button onclick="startRecording()">Start Recording</button>

<h3 id="peopleCount">People detected: 0</h3>
<h3 id="status">System Ready</h3>

</div>

<script>

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let model
let night=false
let thermal=false

let people=0

async function startCamera(){

let stream=await navigator.mediaDevices.getUserMedia({video:true})

video.srcObject=stream

}

function alarm(){

let audio=new AudioContext()

let osc=audio.createOscillator()

osc.frequency.value=350

osc.connect(audio.destination)

osc.start()

setTimeout(()=>osc.stop(),600)

}

function toggleNight(){

night=!night

if(night){
video.style.filter="brightness(1.6)"
}else{
video.style.filter="none"
}

}

function toggleThermal(){

thermal=!thermal

if(thermal){
video.style.filter="hue-rotate(180deg) contrast(1.8)"
}else{
video.style.filter="none"
}

}

async function loadModel(){

model=await cocoSsd.load()

detect()

}

async function detect(){

const predictions=await model.detect(video)

ctx.clearRect(0,0,640,480)

people=0

predictions.forEach(p=>{

let x=p.bbox[0]
let y=p.bbox[1]
let w=p.bbox[2]
let h=p.bbox[3]

let label=p.class
let score=Math.round(p.score*100)

if(label==="person"){
people++
}

ctx.strokeStyle="#00ff88"

ctx.lineWidth=3

ctx.strokeRect(x,y,w,h)

ctx.fillStyle="#00ff88"
ctx.fillText(label+" "+score+"%",x,y)

})

document.getElementById("peopleCount").innerText="People detected: "+people

if(people>2){

document.getElementById("status").innerHTML="⚠ MULTIPLE PEOPLE DETECTED"
document.getElementById("status").className="alert"

alarm()

}else{

document.getElementById("status").innerHTML="Area Secure"

}

requestAnimationFrame(detect)

}

function startRecording(){

let recorder=new MediaRecorder(video.srcObject)

recorder.start()

setTimeout(()=>recorder.stop(),10000)

}

startCamera()

loadModel()

</script>

</body>
</html>
