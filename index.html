<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Military Radar System</title>

<style>

body{
background:#000;
color:#00ff9c;
font-family:Consolas,monospace;
text-align:center;
margin:0;
}

h1{
margin-top:10px;
}

#radar{
background:#020902;
border-radius:50%;
box-shadow:0 0 50px #00ff88;
display:block;
margin:auto;
}

button{
margin:10px;
padding:10px 20px;
background:#011d0f;
border:1px solid #00ff9c;
color:#00ff9c;
border-radius:10px;
cursor:pointer;
}

#panel{
width:420px;
margin:auto;
margin-top:10px;
background:#021006;
border:1px solid #00ff9c;
padding:10px;
border-radius:10px;
}

.alert{
color:red;
}

</style>
</head>

<body>

<h1>Radar Detection System</h1>

<canvas id="radar" width="520" height="520"></canvas>

<br>

<button onclick="scan()">SCAN DEVICE</button>
<button onclick="toggleNight()">Night Mode</button>

<div id="panel">Нет целей</div>

<script>

const canvas=document.getElementById("radar");
const ctx=canvas.getContext("2d");

let angle=0;
let targets=[];
let pulse=0;
let night=true;

function drawRadar(){

ctx.clearRect(0,0,520,520);

ctx.strokeStyle=night?"#00ff9c":"red";
ctx.lineWidth=2;

for(let r=80;r<260;r+=60){

ctx.beginPath();
ctx.arc(260,260,r,0,Math.PI*2);
ctx.stroke();

}

ctx.beginPath();
ctx.moveTo(260,0);
ctx.lineTo(260,520);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(0,260);
ctx.lineTo(520,260);
ctx.stroke();

let sweepX=260+260*Math.cos(angle);
let sweepY=260+260*Math.sin(angle);

ctx.strokeStyle="#00ff66";

ctx.beginPath();
ctx.moveTo(260,260);
ctx.lineTo(sweepX,sweepY);
ctx.stroke();

angle+=0.02;

pulse+=0.1;

targets.forEach(t=>{

let size=6+Math.sin(pulse)*2;

ctx.fillStyle=t.alert?"red":"#00ff9c";

ctx.beginPath();
ctx.arc(t.x,t.y,size,0,Math.PI*2);
ctx.fill();

});

requestAnimationFrame(drawRadar);

}

drawRadar();


function radarBeep(){

let audio=new AudioContext();
let osc=audio.createOscillator();

osc.connect(audio.destination);

osc.frequency.value=1000;

osc.start();

setTimeout(()=>osc.stop(),120);

}


async function scan(){

if(!navigator.bluetooth){

alert("Bluetooth не поддерживается");
return;

}

try{

let device=await navigator.bluetooth.requestDevice({
acceptAllDevices:true
});

radarBeep();

let distance=Math.floor(Math.random()*100);

let x=260+Math.cos(Math.random()*Math.PI*2)*(distance*2);
let y=260+Math.sin(Math.random()*Math.PI*2)*(distance*2);

targets.push({

x:x,
y:y,
name:device.name||"Unknown",
distance:distance,
signal:Math.floor(Math.random()*100),
alert:false

});

if(targets.length>=5){

targets.forEach(t=>t.alert=true);
alarm();

}

updatePanel();

}
catch(e){

console.log(e);

}

}


function alarm(){

let audio=new AudioContext();

let osc=audio.createOscillator();

osc.frequency.value=400;

osc.connect(audio.destination);

osc.start();

setTimeout(()=>osc.stop(),400);

}


function updatePanel(){

let html="Detected devices:<br><br>";

targets.forEach((t,i)=>{

html+=`
${i+1}. ${t.name}
<br>Distance: ${t.distance}m
<br>Signal: ${t.signal}%
<br><br>
`;

});

if(targets.length>=5){

html+="<span class='alert'>ALERT: MANY TARGETS</span>";

}

document.getElementById("panel").innerHTML=html;

}


function toggleNight(){

night=!night;

}

setInterval(()=>{

if(targets.length>0){

scan();

}

},5000);

</script>

</body>
</html>
